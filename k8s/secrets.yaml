# Secret values must be base64-encoded.
# To encode a value: echo -n 'your-value' | base64
#
# Example:
#   echo -n 'mongodb+srv://user:pass@host/db' | base64
#
# Replace all placeholder values below before applying.
apiVersion: v1
kind: Secret
metadata:
  name: todo-api-secrets
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: api
type: Opaque
data:
  # MongoDB connection string (base64-encoded)
  # echo -n 'mongodb+srv://<user>:<password>@<host>/<db>?retryWrites=true' | base64
  AZURE_MONGO_CONNECTION_STRING: <base64-encoded-mongo-connection-string>

  # Azure Application Insights connection string (base64-encoded)
  # echo -n 'InstrumentationKey=xxx;IngestionEndpoint=https://...' | base64
  APPLICATIONINSIGHTS_CONNECTION_STRING: <base64-encoded-appinsights-connection-string>

  # Azure OpenAI API key (base64-encoded)
  # echo -n 'your-openai-api-key' | base64
  AZURE_OPENAI_API_KEY: <base64-encoded-openai-api-key>
