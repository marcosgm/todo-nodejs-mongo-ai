# Replace placeholder values with your actual secrets before applying.
apiVersion: v1
kind: Secret
metadata:
  name: todo-api-secrets
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: api
type: Opaque
stringData:
  AZURE_MONGO_CONNECTION_STRING: "mongodb+srv://<user>:<password>@<host>/<db>?retryWrites=true"
  APPLICATIONINSIGHTS_CONNECTION_STRING: "InstrumentationKey=<key>;IngestionEndpoint=https://<region>.in.applicationinsights.azure.com/"
  AZURE_OPENAI_API_KEY: "<your-openai-api-key>"
