# This workflow builds and pushes API and Web images to ACR, then deploys to AKS.
#
# Prerequisites:
# - An AKS cluster with ACR integration enabled
# - An Azure SP with permissions to access ACR and AKS
# - An OpenAI deployment in Azure
# - A MongoDB instance in Azure
# - An Application Insights resource in Azure
# The script uses GitHub Secrets to store sensitive information. Leverage set-github-secret.sh to set the required secrets in your GitHub repository.
# Set the environment variables below to match your Azure resources.

name: Build and deploy an app to AKS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
  NAMESPACE: ${{ secrets.NAMESPACE }}
  AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  AZURE_MONGO_CONNECTION_STRING: ${{ secrets.AZURE_MONGO_CONNECTION_STRING }}
  AZURE_MONGO_DATABASE_NAME: ${{ secrets.AZURE_MONGO_DATABASE_NAME }}
  APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
  IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}

jobs:
  buildApiImage:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push API image to ACR
        run: |
          az acr build \
            --image todo-api:${{ github.sha }} \
            --image todo-api:latest \
            --registry ${{ env.AZURE_CONTAINER_REGISTRY }} \
            -g ${{ env.RESOURCE_GROUP }} \
            -f src/api/Dockerfile \
            ./src/api

  buildWebImage:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Web image to ACR
        run: |
          az acr build \
            --image todo-web:${{ github.sha }} \
            --image todo-web:latest \
            --registry ${{ env.AZURE_CONTAINER_REGISTRY }} \
            -g ${{ env.RESOURCE_GROUP }} \
            -f src/web/Dockerfile \
            ./src/web

  deploy:
    permissions:
      actions: read
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: production
    needs: [buildApiImage, buildWebImage]
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with: 
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubelogin for non-interactive login
        uses: azure/use-kubelogin@v1.3

      - name: Get K8s context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          admin: 'false'
          use-kubelogin: 'true'

      - name: Deploys Namespace
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: k8s/namespace.yaml

      - name: Deploys RBAC
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: k8s/rbac.yaml

      - name: Deploys Secrets
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: k8s/secrets.yaml

      - name: Deploys Configmaps
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: |
            k8s/configmap.yaml
            k8s/web-configmap.yaml

      - name: Deploys API application
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: k8s/api-deployment.yaml
          images: |
            todo-api:${{ github.sha }}

      - name: Deploys Web application
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: k8s/web-deployment.yaml
          images: |
            todo-web:${{ github.sha }}

      - name: Deploys Ingress
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: ${{ env.NAMESPACE }}
          manifests: k8s/ingress.yaml
